<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Веб-микрофон</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; }
      body {
        background: #121216;
        color: #cdd2dc;
        font-family: system-ui, sans-serif;
      }
      .app {
        max-width: 1200px;
        margin: 0 auto;
        height: 100%;
        display: flex;
        flex-direction: column;
        padding: 16px;
        gap: 12px;
      }
      .cols {
        flex: 1;
        min-height: 0;
        display: flex;
        gap: 12px;
      }
      .col {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      @media (max-width: 700px) {
        .cols { flex-direction: column; }
      }
      .top {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .title { font-size: 15px; color: #788296; font-weight: 600; }
      .status { font-size: 13px; color: #8c929e; }
      .err { font-size: 13px; color: #e67878; }
      .talk {
        font-size: 20px;
        padding: 14px 28px;
        border-radius: 12px;
        border: 1px solid #3a3f4e;
        background: #1d1d24;
        color: #cdd2dc;
        cursor: pointer;
      }
      .talk.on {
        background: #7a2a2a;
        border-color: #a04040;
      }
      .feed {
        flex: 1;
        overflow-y: auto;
        border: 1px solid #2a2f3c;
        border-radius: 12px;
        padding: 14px;
        font-size: 21px;
        line-height: 1.45;
      }
      .hint { color: #5a6070; font-style: italic; font-size: 15px; }
      .partial { color: #828894; font-style: italic; }
      .sent { font-size: 17px; }
      .thumb {
        display: block;
        max-width: 100%;
        border-radius: 8px;
        margin: 6px 0;
      }
      .compose { display: flex; gap: 8px; }
      .msg {
        flex: 1; font-size: 17px; padding: 10px 12px;
        border-radius: 10px; border: 1px solid #3a3f4e;
        background: #1d1d24; color: #cdd2dc;
      }
      .send {
        font-size: 17px; padding: 10px 14px; border-radius: 10px;
        border: 1px solid #3a3f4e; background: #1d1d24;
        color: #cdd2dc; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
